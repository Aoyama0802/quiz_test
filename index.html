<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密のクイズサイト</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f6f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #24292f; margin-bottom: 1.5rem; }
        input[type="password"] {
            padding: 12px;
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            transition: background-color 0.2s;
            font-weight: bold;
            width: 100%;
        }
        .primary-btn { background-color: #2da44e; color: white; }
        .primary-btn:hover { background-color: #2c974b; }
        .secondary-btn { background-color: #f6f8fa; color: #24292f; border: 1px solid #d0d7de; margin-top: 10px; }
        .secondary-btn:hover { background-color: #ebf0f4; }
        
        .question { font-size: 1.3rem; margin-bottom: 1.5rem; color: #24292f; text-align: left; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            color: #24292f;
            text-align: left;
            padding: 15px;
        }
        .option-btn:hover:not(:disabled) { background-color: #ebf0f4; }
        .option-btn.correct { background-color: #dafbe1; border-color: #2da44e; }
        .option-btn.wrong { background-color: #ffebe9; border-color: #cf222e; }

        .explanation-box {
            margin-top: 1.5rem;
            padding: 15px;
            background-color: #f1f8ff;
            border: 1px solid #c8e1ff;
            border-radius: 6px;
            text-align: left;
            display: none;
        }
        .explanation-title { font-weight: bold; color: #0366d6; margin-bottom: 5px; display: block; }
        
        .result-text { margin-top: 1.5rem; font-weight: bold; font-size: 1.2rem; min-height: 1.5rem; }
        #quiz-section, #login-section { display: none; }
        .progress { font-size: 0.9rem; color: #57606a; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1 id="site-title">秘密のクイズ</h1>
        <p id="file-info" style="font-size: 0.8rem; color: #0366d6; margin-bottom: 10px;"></p>
        <p style="color: #57606a; margin-bottom: 1.5rem;">合言葉を入力して、クイズを始めてください。</p>
        <input type="password" id="password-input" placeholder="パスワード">
        <button class="btn primary-btn" onclick="handleLogin()">サイトを開く</button>
        <p id="login-error" style="color: #cf222e; margin-top: 15px; font-size: 0.9rem;"></p>
    </div>

    <div id="quiz-section">
        <div class="progress" id="progress"></div>
        <div id="quiz-content">
            <div class="question" id="question"></div>
            <div class="options" id="options"></div>
            <div class="result-text" id="result-text"></div>
            
            <div class="explanation-box" id="explanation-box">
                <span class="explanation-title">💡 解説</span>
                <div id="explanation-text"></div>
            </div>

            <button class="btn primary-btn" id="next-btn" onclick="nextQuestion()" style="display:none; margin-top: 1.5rem;">次の問題へ</button>
            <button class="btn secondary-btn" id="logout-btn" onclick="logout()" style="display:none;">ログアウト</button>
        </div>
    </div>
</div>

<script>
    let quizData = [];
    let currentQuestion = 0;
    let score = 0;
    
    // URLから読み込むファイル名を取得 (例: ?file=history_quiz.txt)
    const urlParams = new URLSearchParams(window.location.search);
    const targetFile = urlParams.get('file') || 'quiz_encrypted.txt';
    const STORAGE_KEY = 'quiz_key_' + targetFile;

    window.onload = function() {
        document.getElementById('file-info').innerText = `読み込み中: ${targetFile}`;
        const savedKey = sessionStorage.getItem(STORAGE_KEY);
        if (savedKey) {
            unlock(savedKey, true);
        } else {
            document.getElementById('login-section').style.display = 'block';
        }
    };

    function handleLogin() {
        const password = document.getElementById('password-input').value;
        unlock(password, false);
    }

    async function unlock(password, isAutoLogin) {
        const errorEl = document.getElementById('login-error');
        errorEl.innerText = "";
        
        try {
            const response = await fetch('./' + targetFile);
            if (!response.ok) throw new Error(`${targetFile} が見つかりません。ファイル名が正しいか確認してください。`);
            const encryptedBase64 = await response.text();

            const encryptedData = CryptoJS.enc.Base64.parse(encryptedBase64.trim());
            const iv = CryptoJS.lib.WordArray.create(encryptedData.words.slice(0, 4));
            const ciphertext = CryptoJS.lib.WordArray.create(encryptedData.words.slice(4));

            const key = isAutoLogin ? CryptoJS.enc.Hex.parse(password) : CryptoJS.SHA256(password);

            const decrypted = CryptoJS.AES.decrypt(
                { ciphertext: ciphertext },
                key,
                { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
            );

            const jsonText = decrypted.toString(CryptoJS.enc.Utf8);
            if (!jsonText) throw new Error('パスワードが違います。');

            quizData = JSON.parse(jsonText);
            
            if (!isAutoLogin) {
                sessionStorage.setItem(STORAGE_KEY, key.toString());
            }

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            loadQuiz();
            
        } catch (e) {
            if (isAutoLogin) {
                sessionStorage.removeItem(STORAGE_KEY);
                document.getElementById('login-section').style.display = 'block';
            } else {
                errorEl.innerText = "エラー: " + e.message;
            }
        }
    }

    function loadQuiz() {
        resetState();
        const currentQuizData = quizData[currentQuestion];
        document.getElementById('progress').innerText = `問題 ${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById('question').innerText = currentQuizData.question;

        currentQuizData.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option;
            button.className = 'btn option-btn';
            button.onclick = () => selectOption(index);
            document.getElementById('options').appendChild(button);
        });
    }

    function resetState() {
        document.getElementById('options').innerHTML = '';
        document.getElementById('result-text').innerText = '';
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'none';
    }

    function selectOption(index) {
        const currentQuizData = quizData[currentQuestion];
        const buttons = document.querySelectorAll('.option-btn');
        
        buttons.forEach((btn, i) => {
            btn.disabled = true;
            if (i === currentQuizData.correct) {
                btn.classList.add('correct');
            } else if (i === index) {
                btn.classList.add('wrong');
            }
        });

        const resultEl = document.getElementById('result-text');
        if (index === currentQuizData.correct) {
            resultEl.innerText = "正解！🎉";
            resultEl.style.color = "#2da44e";
            score++;
        } else {
            resultEl.innerText = "残念！不正解です。";
            resultEl.style.color = "#cf222e";
        }

        // 解説の表示
        if (currentQuizData.explanation) {
            document.getElementById('explanation-text').innerText = currentQuizData.explanation;
            document.getElementById('explanation-box').style.display = 'block';
        }

        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuiz();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        document.getElementById('progress').innerText = "結果発表";
        document.getElementById('question').innerText = "すべての問題が終了しました！";
        document.getElementById('options').innerHTML = `<p style="font-size: 2rem; margin: 1rem 0;">${score} / ${quizData.length}</p>`;
        document.getElementById('result-text').innerText = score === quizData.length ? "パーフェクト！素晴らしいです！" : "お疲れ様でした！";
        document.getElementById('explanation-box').style.display = 'none';
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = "最初から挑戦する";
        nextBtn.onclick = () => {
            currentQuestion = 0;
            score = 0;
            loadQuiz();
        };
        nextBtn.style.display = 'block';
        document.getElementById('logout-btn').style.display = 'block';
    }

    function logout() {
        sessionStorage.removeItem(STORAGE_KEY);
        location.reload();
    }
</script>

</body>
</html>
