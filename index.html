<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密のクイズサイト</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f6f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { color: #24292f; margin-bottom: 1.5rem; }
        input[type="password"] {
            padding: 12px;
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            transition: background-color 0.2s;
            font-weight: bold;
            width: 100%;
        }
        .primary-btn { background-color: #2da44e; color: white; }
        .primary-btn:hover { background-color: #2c974b; }
        .secondary-btn { background-color: #f6f8fa; color: #24292f; border: 1px solid #d0d7de; margin-top: 10px; }
        .secondary-btn:hover { background-color: #ebf0f4; }
        
        .question { font-size: 1.3rem; margin-bottom: 1.5rem; color: #24292f; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            color: #24292f;
        }
        .option-btn:hover { background-color: #ebf0f4; }
        .result { margin-top: 1.5rem; font-weight: bold; font-size: 1.2rem; min-height: 1.5rem; }
        #quiz-section, #login-section { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>秘密のクイズ</h1>
        <p style="color: #57606a; margin-bottom: 1.5rem;">合言葉を入力して、クイズを始めてください。</p>
        <input type="password" id="password-input" placeholder="パスワード">
        <button class="btn primary-btn" onclick="handleLogin()">サイトを開く</button>
        <p id="login-error" style="color: #cf222e; margin-top: 15px; font-size: 0.9rem;"></p>
    </div>

    <div id="quiz-section">
        <h1 id="quiz-title">クイズスタート！</h1>
        <div id="quiz-content">
            <div class="question" id="question"></div>
            <div class="options" id="options"></div>
            <div class="result" id="result"></div>
            <button class="btn primary-btn" id="next-btn" onclick="nextQuestion()" style="display:none; margin-top: 1.5rem;">次の問題へ</button>
            <button class="btn secondary-btn" id="logout-btn" onclick="logout()" style="display:none;">ログアウト</button>
        </div>
    </div>
</div>

<script>
    let quizData = [];
    let currentQuestion = 0;
    let score = 0;
    const STORAGE_KEY = 'quiz_secret_key';

    // ページ読み込み時にログイン状態を確認
    window.onload = function() {
        const savedKey = sessionStorage.getItem(STORAGE_KEY);
        if (savedKey) {
            // 保存された鍵がある場合は自動でアンロックを試みる
            unlock(savedKey, true);
        } else {
            document.getElementById('login-section').style.display = 'block';
        }
    };

    function handleLogin() {
        const password = document.getElementById('password-input').value;
        unlock(password, false);
    }

    async function unlock(password, isAutoLogin) {
        const errorEl = document.getElementById('login-error');
        errorEl.innerText = "";
        
        try {
            const response = await fetch('./quiz_encrypted.txt');
            if (!response.ok) throw new Error('暗号化ファイルが見つかりません。');
            const encryptedBase64 = await response.text();

            const encryptedData = CryptoJS.enc.Base64.parse(encryptedBase64.trim());
            const iv = CryptoJS.lib.WordArray.create(encryptedData.words.slice(0, 4));
            const ciphertext = CryptoJS.lib.WordArray.create(encryptedData.words.slice(4));

            // パスワードをそのまま使うか、保存された鍵（ハッシュ済み）を使うか判定
            const key = isAutoLogin ? CryptoJS.enc.Hex.parse(password) : CryptoJS.SHA256(password);

            const decrypted = CryptoJS.AES.decrypt(
                { ciphertext: ciphertext },
                key,
                { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
            );

            const jsonText = decrypted.toString(CryptoJS.enc.Utf8);
            if (!jsonText) throw new Error('パスワードが違います。');

            quizData = JSON.parse(jsonText);
            
            // ログイン成功時、鍵をセッションストレージに保存（ブラウザを閉じるまで有効）
            if (!isAutoLogin) {
                sessionStorage.setItem(STORAGE_KEY, key.toString());
            }

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            loadQuiz();
            
        } catch (e) {
            if (isAutoLogin) {
                // 自動ログイン失敗時はログイン画面を出す
                sessionStorage.removeItem(STORAGE_KEY);
                document.getElementById('login-section').style.display = 'block';
            } else {
                errorEl.innerText = "エラー: " + e.message;
            }
            console.error(e);
        }
    }

    function loadQuiz() {
        resetState();
        const currentQuizData = quizData[currentQuestion];
        document.getElementById('question').innerText = currentQuizData.question;

        currentQuizData.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option;
            button.className = 'btn option-btn';
            button.onclick = () => selectOption(index);
            document.getElementById('options').appendChild(button);
        });
        document.getElementById('logout-btn').style.display = 'none';
    }

    function resetState() {
        document.getElementById('options').innerHTML = '';
        document.getElementById('result').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectOption(index) {
        const currentQuizData = quizData[currentQuestion];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        const resultEl = document.getElementById('result');
        if (index === currentQuizData.correct) {
            resultEl.innerText = "正解！🎉";
            resultEl.style.color = "#2da44e";
            score++;
        } else {
            resultEl.innerText = "残念！正解は「" + currentQuizData.options[currentQuizData.correct] + "」でした。";
            resultEl.style.color = "#cf222e";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuiz();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        document.getElementById('question').innerText = "すべての問題が終了しました！";
        document.getElementById('options').innerHTML = `<p style="font-size: 1.5rem; margin: 1rem 0;">スコア: ${score} / ${quizData.length}</p>`;
        document.getElementById('result').innerText = "お疲れ様でした！";
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = "もう一度挑戦";
        nextBtn.onclick = () => {
            currentQuestion = 0;
            score = 0;
            loadQuiz();
        };
        nextBtn.style.display = 'block';
        
        document.getElementById('logout-btn').style.display = 'block';
    }

    function logout() {
        sessionStorage.removeItem(STORAGE_KEY);
        location.reload();
    }
</script>

</body>
</html>
